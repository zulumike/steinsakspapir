<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stein Saks Papir</title>
</head>
<body>
    <main>
        <div id='lobby'>
            <div id='createSection'>
                <h3>Opprett spill</h3>
                <input id='creatorName' placeholder='Ditt navn'>
                <button id='createGameBtn'>Opprett spill</button>
                <p id='gameCode'></p>
            </div>
            <div id='joinSection'>
                <h3>Bli med i spill</h3>
                <input id='playerName' placeholder='Ditt navn'>
                <input id='joinCode' placeholder='Spill kode'>
                <button id='joinBtn'>Bli med</button>
            </div>
            <div id='players'>
            </div>
            <div id='game' style="display:none;">
            </div>
        </div>
    </main>
</body>
</html>
